<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#141e3a" />
    </linearGradient>

    <!-- Node Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="coreGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fd1c5" />
      <stop offset="100%" stop-color="#2c7a7b" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="40" />

  <!-- Outer Ring (Heptagon) -->
  <polygon points="
    200,50
    317,106
    345,231
    265,335
    135,335
    55,231
    83,106"
    fill="none" stroke="#2c5282" stroke-width="2" stroke-opacity="0.5" />

  <!-- Connecting Lines to Center -->
  <g stroke="#3182ce" stroke-width="3" stroke-opacity="0.8">
    <line x1="200" y1="200" x2="200" y2="50" />
    <line x1="200" y1="200" x2="317" y2="106" />
    <line x1="200" y1="200" x2="345" y2="231" />
    <line x1="200" y1="200" x2="265" y2="335" />
    <line x1="200" y1="200" x2="135" y2="335" />
    <line x1="200" y1="200" x2="55" y2="231" />
    <line x1="200" y1="200" x2="83" y2="106" />
  </g>

  <!-- Interconnecting Web (Debate) -->
  <g stroke="#4299e1" stroke-width="1.5" stroke-opacity="0.3">
    <line x1="200" y1="50" x2="345" y2="231" />
    <line x1="317" y1="106" x2="265" y2="335" />
    <line x1="345" y1="231" x2="135" y2="335" />
    <line x1="265" y1="335" x2="55" y2="231" />
    <line x1="135" y1="335" x2="83" y2="106" />
    <line x1="55" y1="231" x2="200" y2="50" />
    <line x1="83" y1="106" x2="317" y2="106" />
  </g>

  <!-- The 7 Specialist Nodes -->
  <!-- Naysayer -->
  <circle cx="200" cy="50" r="12" fill="#fc8181" filter="url(#glow)" />
  <!-- Security Sentinel -->
  <circle cx="317" cy="106" r="12" fill="#f6ad55" filter="url(#glow)" />
  <!-- The Architect -->
  <circle cx="345" cy="231" r="12" fill="#68d391" filter="url(#glow)" />
  <!-- Product Visionary -->
  <circle cx="265" cy="335" r="12" fill="#4fd1c5" filter="url(#glow)" />
  <!-- Context Master (Outer Representation) -->
  <circle cx="135" cy="335" r="12" fill="#63b3ed" filter="url(#glow)" />
  <!-- Creative Strategist -->
  <circle cx="55" cy="231" r="12" fill="#b794f4" filter="url(#glow)" />
  <!-- Optimizer -->
  <circle cx="83" cy="106" r="12" fill="#f687b3" filter="url(#glow)" />

  <!-- Center Core (Synthesis Engine) -->
  <circle cx="200" cy="200" r="28" fill="url(#coreGlow)" filter="url(#glow)" />
  <circle cx="200" cy="200" r="14" fill="#ffffff" opacity="0.8" />
  
  <!-- Subtle Tech Rings around Core -->
  <circle cx="200" cy="200" r="45" fill="none" stroke="#4fd1c5" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4" />
  <circle cx="200" cy="200" r="60" fill="none" stroke="#63b3ed" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="10 5" />
</svg>